kind = "web"
previewPath = "/"
title = "VayuWatch"
version = "1.0.0"
id = "artifacts/vayuwatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21759

[services.development]
run = "pnpm --filter @workspace/vayuwatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vayuwatch", "run", "build" ]
publicDir = "artifacts/vayuwatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21759"
BASE_PATH = "/"
